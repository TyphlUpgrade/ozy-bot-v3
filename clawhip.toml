# clawhip — event routing daemon for Ozymandias trading bot
#
# Watches signal files in state/signals/ and routes events to Discord.
# External binary dependency — install clawhip separately.
# Linux requires inotify-tools: sudo pacman -S inotify-tools
#
# Environment variables (operator must configure in .env):
#   DISCORD_BOT_TOKEN   — Discord bot token
#   ALERTS_CHANNEL      — Channel ID for alerts
#   TRADES_CHANNEL      — Channel ID for trade notifications
#   REVIEWS_CHANNEL     — Channel ID for Claude review summaries
#   DEV_CHANNEL         — Channel ID for git commit notifications
#   AGENT_CHANNEL       — Channel ID for agent task updates
#   OPERATOR_MENTION    — Discord mention string for alert pings

[providers.discord]
token = "${DISCORD_BOT_TOKEN}"
default_channel = "${ALERTS_CHANNEL}"

[daemon]
port = 25294

[defaults]
format = "compact"

# --- Monitors ---

[monitors]
poll_interval_secs = 5

[[monitors.workspace]]
path = "/home/typhlupgrade/.local/share/ozy-bot-v3"
watch_dirs = ["ozymandias/state/signals"]
poll_interval_secs = 5

[[monitors.git.repos]]
path = "."

# --- Routes ---

# Trade fills → #trades
[[routes]]
event = "workspace.file.changed"
filter = { path = "**/last_trade.json" }
channel = "${TRADES_CHANNEL}"
format = "compact"

# Alerts → #alerts (with operator ping)
[[routes]]
event = "workspace.file.changed"
filter = { path = "**/alerts/*" }
channel = "${ALERTS_CHANNEL}"
format = "alert"
mention = "${OPERATOR_MENTION}"

# Claude reviews → #reviews
[[routes]]
event = "workspace.file.changed"
filter = { path = "**/last_review.json" }
channel = "${REVIEWS_CHANNEL}"
format = "compact"

# Git commits → #dev
[[routes]]
event = "git.commit"
channel = "${DEV_CHANNEL}"
format = "compact"

# Agent tasks → #agents
[[routes]]
event = "workspace.file.changed"
filter = { path = "**/agent_tasks/*" }
channel = "${AGENT_CHANNEL}"
format = "compact"

# Executor checkpoints → #agents (alert format)
[[routes]]
event = "workspace.file.changed"
filter = { path = "**/executor/checkpoint.json" }
channel = "${AGENT_CHANNEL}"
format = "alert"

# Permission requests → #alerts (with operator ping, requires !approve / !deny response)
[[routes]]
event = "workspace.file.changed"
filter = { path = "**/conductor/permission_request.json" }
channel = "${ALERTS_CHANNEL}"
format = "alert"
mention = "${OPERATOR_MENTION}"
